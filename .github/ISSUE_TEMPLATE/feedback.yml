name: Feedback
description: Report a bug or suggest an improvement for DraftOps
labels: ['feedback']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened / what would you like to see?
      description: Describe the bug or the feature you'd like.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce (if a bug)
      description: What were you doing when it happened?
    validations:
      required: false
  - type: input
    id: page
    attributes:
      label: Page / URL
      description: Which page were you on?
    validations:
      required: false
