version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      next-and-react:
        patterns:
          - 'next'
          - 'next-auth'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      eslint-and-prettier:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'prettier*'
      testing:
        patterns:
          - 'jest*'
          - '@testing-library/*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'

  - package-ecosystem: 'uv'
    directory: '/'
    schedule:
      interval: 'weekly'
