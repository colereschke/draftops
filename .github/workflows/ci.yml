name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Type-check, Format & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm-node
        with:
          install-args: --ignore-scripts

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test --passWithNoTests

  build:
    name: Production build
    runs-on: ubuntu-latest

    # Placeholder values so `next build` can evaluate config/env-dependent
    # modules without reaching a live provider. Never real secrets.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/placeholder
      AUTH_SECRET: ci-build-placeholder-secret-not-a-real-credential
      AUTH_DISCORD_ID: ci-build-placeholder
      AUTH_DISCORD_SECRET: ci-build-placeholder
      OWNER_DISCORD_ID: '0'

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm-node

      - name: Build
        run: pnpm build

  postgres:
    name: PostgreSQL migrations & integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: draftops
          POSTGRES_PASSWORD: draftops
          # Must end in _test: scripts/testDatabase.ts refuses to run destructive
          # resets against a database name that doesn't match this safety pattern.
          POSTGRES_DB: draftops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # DIRECT_URL and TEST_DATABASE_URL are intentionally omitted: prisma.config.ts
    # falls back to DATABASE_URL when DIRECT_URL is unset, and scripts/testDatabase.ts
    # derives TEST_DATABASE_URL from DATABASE_URL the same way when unset.
    env:
      DATABASE_URL: postgresql://draftops:draftops@localhost:5432/draftops_test

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm-node

      - name: Deploy migrations against a clean database
        run: pnpm prisma migrate deploy

      - name: Seed smoke test
        run: |
          pnpm db:seed
          count=$(psql "$DATABASE_URL" -tAc 'SELECT COUNT(*) FROM "Team"')
          # LEAGUE_TEAMS (src/lib/teams.ts) always seeds exactly 12 teams — a
          # partial count (not just zero) means seed.ts's swallowed error path
          # (main().catch(console.error), no non-zero exit) was hit.
          if [ "$count" -ne 12 ]; then
            echo "::error::Expected 12 seeded teams, got $count (seed.ts may have failed partway through)"
            exit 1
          fi
          echo "Seeded $count teams"

      - name: Integration tests (real PostgreSQL)
        run: pnpm test:integration

  projections:
    name: Python projection checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install projection tooling
        run: uv sync --extra dev

      - name: Projection checks (pytest, ruff, mypy)
        run: make projections-check UV_RUN_ARGS=--no-sync

  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: draftops
          POSTGRES_PASSWORD: draftops
          POSTGRES_DB: draftops_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Placeholder Discord values, same pattern as the `build` job: needed only so
    # NextAuth's config can be evaluated, never exercised (auth is via a signed
    # test cookie minted in e2e/global-setup.ts, not real Discord OAuth).
    env:
      DATABASE_URL: postgresql://draftops:draftops@localhost:5432/draftops_e2e
      AUTH_SECRET: ci-e2e-placeholder-secret-not-a-real-credential
      AUTH_DISCORD_ID: ci-build-placeholder
      AUTH_DISCORD_SECRET: ci-build-placeholder
      AUTH_TRUST_HOST: '1'
      E2E_TEST_USER_ID: e2e-test-user
      PORT: '3100'

    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-pnpm-node

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Deploy migrations against a clean database
        run: pnpm prisma migrate deploy

      - name: Seed e2e fixture data
        run: pnpm tsx e2e/seed.ts

      - name: Build
        run: pnpm build

      - name: Run Playwright smoke suite
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
