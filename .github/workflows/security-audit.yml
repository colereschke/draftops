name: Security Audit

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  audit:
    name: pnpm audit (production dependencies)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # `pnpm audit` resolves entirely from package.json + pnpm-lock.yaml
      # against the registry's advisory DB — no install needed.
      - name: Audit production dependencies
        run: pnpm audit --prod
